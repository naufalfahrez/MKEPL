name: Continuous Inspection

on:
  push:
    branches:
      - main
      - contoh-gagal-rakan
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - contoh-gagal-rakan

permissions:
  contents: read

jobs:
  analyze:
    name: Build and analyze
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Quality Gate Threshold (Simulated)
        if: github.ref == 'refs/heads/contoh-gagal-rakan'
        run: |
          echo "Error: Quality Gate failed because Reliability Rating is D (Threshold is B)."
          exit 1

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=naufalfahrez_MKEPL -Dsonar.organization=naufalfahrez -Dsonar.qualitygate.wait=true
